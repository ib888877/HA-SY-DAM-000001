type: sections
max_columns: 4
title: درجة الحرارة
path: temperature
icon: mdi:home-thermometer-outline
sections:
  - type: grid
    title: نظرة عامة
    cards:
      - type: tile
        entity: sensor.kitchen_temperature_sensor_temperature
        name: المطبخ
        vertical: false
        features_position: bottom
      - type: tile
        entity: sensor.living_room_temperature_sensor_temperature
        features_position: bottom
        vertical: false
        name: غرفة المعيشة
      - type: tile
        entity: sensor.bedroom_temperature_sensor_temperature
        features_position: bottom
        vertical: false
        name: غرفة النوم
      - type: tile
        entity: sensor.maya_room_temperature_sensor_temperature
        name: خارج المنزل
        vertical: false
        features_position: bottom
      - type: tile
        entity: sensor.shellyplusuni_a0dd6c295c74_fridge_temperature_sensor_temperature
        name: البراد
        icon: mdi:fridge
        color: blue
        vertical: false
        features_position: bottom
  - type: grid
    title: المخططات البيانية
    cards:
      - type: weather-forecast
        entity: weather.forecast_home
        show_forecast: true
        forecast_type: daily
      - type: markdown
        content: '## البراد'
      - type: statistics-graph
        chart_type: line
        period: 5minute
        entities:
          - sensor.shellyplusuni_a0dd6c295c74_fridge_temperature_sensor_temperature
        stat_types:
          - mean
        days_to_show: 1
      - type: markdown
        content: '## غرفة النوم'
      - type: statistics-graph
        chart_type: line
        period: hour
        entities:
          - sensor.bedroom_temperature_sensor_temperature
        stat_types:
          - mean
        days_to_show: 1
      - type: markdown
        content: '## غرفة المعيشة'
      - type: statistics-graph
        chart_type: line
        period: hour
        entities:
          - sensor.living_room_temperature_sensor_temperature
          - sensor.living_room_air_conditioner_temperature
        stat_types:
          - mean
        days_to_show: 1
      - type: markdown
        content: '## خارج المنزل'
      - type: statistics-graph
        chart_type: line
        period: hour
        entities:
          - sensor.maya_room_temperature_sensor_temperature
        stat_types:
          - mean
        days_to_show: 1
      - type: markdown
        content: '## المطبخ'
      - type: statistics-graph
        chart_type: line
        period: hour
        entities:
          - sensor.kitchen_temperature_sensor_temperature
        stat_types:
          - mean
        days_to_show: 1
