              - color: rgba(255,255,255,0.92)

      - type: tile
        entity: sensor.living_room_air_conditioner_temperature
        name: حرارة المكيف
        vertical: false
        features_position: bottom

  - type: grid
    title: الطقس والاتجاهات
    cards:
      - type: weather-forecast
        entity: weather.forecast_home
        show_forecast: true
        forecast_type: daily

      - type: statistics-graph
        title: البراد
        chart_type: line
        period: 5minute
        days_to_show: 1
        stat_types:
          - mean
        entities:
          - sensor.shellyplusuni_a0dd6c295c74_fridge_temperature_sensor_temperature

      - type: statistics-graph
        title: غرفة النوم
        chart_type: line
        period: hour
        days_to_show: 1
        stat_types:
          - mean
        entities:
          - sensor.bedroom_temperature_sensor_temperature

      - type: statistics-graph
        title: غرفة المعيشة
        chart_type: line
        period: hour
        days_to_show: 1
        stat_types:
          - mean
        entities:
          - sensor.living_room_temperature_sensor_temperature
          - sensor.living_room_air_conditioner_temperature

      - type: statistics-graph
        title: خارج المنزل
        chart_type: line
        period: hour
        days_to_show: 1
        stat_types:
          - mean
        entities:
          - sensor.maya_room_temperature_sensor_temperature

      - type: statistics-graph
        title: المطبخ
        chart_type: line
        period: hour
        days_to_show: 1
        stat_types:
          - mean
        entities:
          - sensor.kitchen_temperature_sensor_temperature