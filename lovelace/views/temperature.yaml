            - width: 36px
            - height: 36px
          icon:
            - color: white
            - width: 34px
          name:
            - justify-self: start
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            value:
              - justify-self: start
              - font-size: 24px
              - font-weight: 800
            status:
              - justify-self: start
              - font-size: 15px
              - font-weight: 700
              - color: rgba(255,255,255,0.92)

      - type: custom:button-card
        entity: sensor.bedroom_temperature_sensor_temperature
        name: غرفة النوم
        icon: mdi:bed-queen-outline
        show_state: false
        tap_action:
