type: sections
max_columns: 4
title: درجة الحرارة
path: temperature
icon: mdi:home-thermometer-outline

sections:
  - type: grid
    title: نظرة عامة
    cards:
      - type: custom:button-card
        entity: sensor.maya_room_temperature_sensor_temperature
        name: خارج المنزل
        icon: mdi:home-thermometer-outline
        show_state: false
        tap_action:
          action: more-info
        hold_action:
          action: more-info
        grid_options:
          columns: 6
          rows: 2
        custom_fields:
          value: >
            [[[
              const t = Number(entity.state);
              return Number.isFinite(t) ? `${t.toFixed(1)}°C` : '--';
            ]]]
          status: >
            [[[
              const t = Number(entity.state);
              if (!Number.isFinite(t)) return 'لا توجد قراءة';
              if (t < 10) return 'بارد';
              if (t < 25) return 'معتدل';
              if (t < 32) return 'دافئ';
              return 'حار';
            ]]]
        styles:
          card:
            - background: >
                [[[
                  const t = Number(entity.state);
                  if (!Number.isFinite(t)) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  if (t < 10) return 'linear-gradient(135deg, #2f7a6d, #68b0a1)';
                  if (t < 32) return 'linear-gradient(135deg, #7da453, #a8c66c)';
                  return 'linear-gradient(135deg, #c49a3a, #e6c76a)';
                ]]]
            - color: white
            - border-radius: 20px
            - padding: 16px
            - height: 108px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.20)
          grid:
            - grid-template-areas: '"i n" "i value" "i status"'
            - grid-template-columns: 52px 1fr
            - grid-template-rows: min-content min-content 1fr
            - column-gap: 12px
          img_cell:
            - align-self: center
            - justify-self: center
            - width: 36px
            - height: 36px
          icon:
            - color: white
            - width: 34px
          name:
            - align-self: end
            - justify-self: start
            - color: white
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            value:
              - align-self: center
              - justify-self: start
              - color: white
              - font-size: 24px
              - font-weight: 800
              - line-height: 1.2
            status:
              - align-self: start
              - justify-self: start
              - color: rgba(255,255,255,0.92)
              - font-size: 15px
              - font-weight: 700

      - type: custom:button-card
        entity: sensor.shellyplusuni_a0dd6c295c74_fridge_temperature_sensor_temperature
        name: البراد
        icon: mdi:fridge
        show_state: false
        tap_action:
          action: more-info
        hold_action:
          action: more-info
        grid_options:
          columns: 6
          rows: 2
        custom_fields:
          value: >
            [[[
              const t = Number(entity.state);
              return Number.isFinite(t) ? `${t.toFixed(1)}°C` : '--';
            ]]]
          status: >
            [[[
              const t = Number(entity.state);
              if (!Number.isFinite(t)) return 'لا توجد قراءة';
              if (t <= 0) return 'تجميد';
              if (t > 5) return 'حرارة مرتفعة';
              return 'تبريد طبيعي';
            ]]]
        styles:
          card:
            - background: >
                [[[
                  const t = Number(entity.state);
                  if (!Number.isFinite(t)) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  if (t <= 0) return 'linear-gradient(135deg, #2f7a6d, #68b0a1)';
                  if (t > 5) return 'linear-gradient(135deg, #c49a3a, #e6c76a)';
                  return 'linear-gradient(135deg, #7da453, #a8c66c)';
                ]]]
            - color: white
            - border-radius: 20px
            - padding: 16px
            - height: 108px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.20)
          grid:
            - grid-template-areas: '"i n" "i value" "i status"'
            - grid-template-columns: 52px 1fr
            - grid-template-rows: min-content min-content 1fr
            - column-gap: 12px
          img_cell:
            - align-self: center
            - justify-self: center
            - width: 36px
            - height: 36px
          icon:
            - color: white
            - width: 34px
          name:
            - align-self: end
            - justify-self: start
            - color: white
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            value:
              - align-self: center
              - justify-self: start
              - color: white
              - font-size: 24px
              - font-weight: 800
              - line-height: 1.2
            status:
              - align-self: start
              - justify-self: start
              - color: rgba(255,255,255,0.92)
              - font-size: 15px
              - font-weight: 700

      - type: custom:button-card
        entity: sensor.living_room_temperature_sensor_temperature
        name: أعلى غرفة
        icon: mdi:thermometer-chevron-up
        show_state: false
        tap_action:
          action: more-info
        hold_action:
          action: more-info
        grid_options:
          columns: 6
          rows: 2
        custom_fields:
          value: >
            [[[
              const rooms = [
                { name: 'المطبخ', value: Number(states['sensor.kitchen_temperature_sensor_temperature']?.state) },
                { name: 'المعيشة', value: Number(states['sensor.living_room_temperature_sensor_temperature']?.state) },
                { name: 'النوم', value: Number(states['sensor.bedroom_temperature_sensor_temperature']?.state) }
              ].filter(x => Number.isFinite(x.value));

              if (!rooms.length) return '--';
              rooms.sort((a, b) => b.value - a.value);
              return `${rooms[0].value.toFixed(1)}°C`;
            ]]]
          status: >
            [[[
              const rooms = [
                { name: 'المطبخ', value: Number(states['sensor.kitchen_temperature_sensor_temperature']?.state) },
                { name: 'المعيشة', value: Number(states['sensor.living_room_temperature_sensor_temperature']?.state) },
                { name: 'النوم', value: Number(states['sensor.bedroom_temperature_sensor_temperature']?.state) }
              ].filter(x => Number.isFinite(x.value));

              if (!rooms.length) return 'لا توجد قراءة';
              rooms.sort((a, b) => b.value - a.value);
              return rooms[0].name;
            ]]]
        styles:
          card:
            - background: >
                [[[
                  const rooms = [
                    Number(states['sensor.kitchen_temperature_sensor_temperature']?.state),
                    Number(states['sensor.living_room_temperature_sensor_temperature']?.state),
                    Number(states['sensor.bedroom_temperature_sensor_temperature']?.state)
                  ].filter(v => Number.isFinite(v));

                  if (!rooms.length) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  const max = Math.max(...rooms);
                  if (max < 24) return 'linear-gradient(135deg, #7da453, #a8c66c)';
                  if (max < 28) return 'linear-gradient(135deg, #8d6e63, #bcaaa4)';
                  return 'linear-gradient(135deg, #c49a3a, #e6c76a)';
                ]]]
            - color: white
            - border-radius: 20px
            - padding: 16px
            - height: 108px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.20)
          grid:
            - grid-template-areas: '"i n" "i value" "i status"'
            - grid-template-columns: 52px 1fr
            - grid-template-rows: min-content min-content 1fr
            - column-gap: 12px
          img_cell:
            - align-self: center
            - justify-self: center
            - width: 36px
            - height: 36px
          icon:
            - color: white
            - width: 34px
          name:
            - align-self: end
            - justify-self: start
            - color: white
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            value:
              - align-self: center
              - justify-self: start
              - color: white
              - font-size: 24px
              - font-weight: 800
            status:
              - align-self: start
              - justify-self: start
              - color: rgba(255,255,255,0.92)
              - font-size: 15px
              - font-weight: 700

      - type: custom:button-card
        entity: sensor.bedroom_temperature_sensor_temperature
        name: أبرد غرفة
        icon: mdi:thermometer-chevron-down
        show_state: false
        tap_action:
          action: more-info
        hold_action:
          action: more-info
        grid_options:
          columns: 6
          rows: 2
        custom_fields:
          value: >
            [[[
              const rooms = [
                { name: 'المطبخ', value: Number(states['sensor.kitchen_temperature_sensor_temperature']?.state) },
                { name: 'المعيشة', value: Number(states['sensor.living_room_temperature_sensor_temperature']?.state) },
                { name: 'النوم', value: Number(states['sensor.bedroom_temperature_sensor_temperature']?.state) }
              ].filter(x => Number.isFinite(x.value));

              if (!rooms.length) return '--';
              rooms.sort((a, b) => a.value - b.value);
              return `${rooms[0].value.toFixed(1)}°C`;
            ]]]
          status: >
            [[[
              const rooms = [
                { name: 'المطبخ', value: Number(states['sensor.kitchen_temperature_sensor_temperature']?.state) },
                { name: 'المعيشة', value: Number(states['sensor.living_room_temperature_sensor_temperature']?.state) },
                { name: 'النوم', value: Number(states['sensor.bedroom_temperature_sensor_temperature']?.state) }
              ].filter(x => Number.isFinite(x.value));

              if (!rooms.length) return 'لا توجد قراءة';
              rooms.sort((a, b) => a.value - b.value);
              return rooms[0].name;
            ]]]
        styles:
          card:
            - background: >
                [[[
                  const rooms = [
                    Number(states['sensor.kitchen_temperature_sensor_temperature']?.state),
                    Number(states['sensor.living_room_temperature_sensor_temperature']?.state),
                    Number(states['sensor.bedroom_temperature_sensor_temperature']?.state)
                  ].filter(v => Number.isFinite(v));

                  if (!rooms.length) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  const min = Math.min(...rooms);
                  if (min < 18) return 'linear-gradient(135deg, #2f7a6d, #68b0a1)';
                  return 'linear-gradient(135deg, #7da453, #a8c66c)';
                ]]]
            - color: white
            - border-radius: 20px
            - padding: 16px
            - height: 108px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.20)
          grid:
            - grid-template-areas: '"i n" "i value" "i status"'
            - grid-template-columns: 52px 1fr
            - grid-template-rows: min-content min-content 1fr
            - column-gap: 12px
          img_cell:
            - align-self: center
            - justify-self: center
            - width: 36px
            - height: 36px
          icon:
            - color: white
            - width: 34px
          name:
            - align-self: end
            - justify-self: start
            - color: white
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            value:
              - align-self: center
              - justify-self: start
              - color: white
              - font-size: 24px
              - font-weight: 800
            status:
              - align-self: start
              - justify-self: start
              - color: rgba(255,255,255,0.92)
              - font-size: 15px
              - font-weight: 700

  - type: grid
    title: الغرف
    cards:
      - type: custom:button-card
