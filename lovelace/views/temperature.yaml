type: sections
max_columns: 4
title: درجة الحرارة
path: temperature
icon: mdi:home-thermometer-outline
sections:
  - type: grid
    title: نظرة عامة
    cards:
      - type: tile
        entity: sensor.kitchen_temperature_sensor_temperature
        name: المطبخ
        vertical: false
        features_position: bottom
      - type: tile
        entity: sensor.living_room_temperature_sensor_temperature
        features_position: bottom
        vertical: false
        name: غرفة المعيشة
      - type: tile
        entity: sensor.bedroom_temperature_sensor_temperature
        features_position: bottom
        vertical: false
        name: غرفة النوم
      - type: tile
        entity: sensor.maya_room_temperature_sensor_temperature
        name: خارج المنزل
        vertical: false
        features_position: bottom
      - type: custom:button-card
        entity: sensor.shellyplusuni_a0dd6c295c74_fridge_temperature_sensor_temperature
        name: البراد
        icon: mdi:fridge
        show_state: false
        custom_fields:
          temp: >
            [[[
              const temp = Number(entity.state);
              return Number.isFinite(temp) ? `${temp.toFixed(1)}°C` : '--';
            ]]]
          status: >
            [[[
              const temp = Number(entity.state);
              if (!Number.isFinite(temp)) return 'لا توجد قراءة';
              if (temp <= 0) return 'تجميد';
              if (temp > 5) return 'حرارة مرتفعة';
              return 'تبريد طبيعي';
            ]]]
        tap_action:
          action: more-info
        styles:
          card:
            - background: >
                [[[
                  const temp = Number(entity.state);
                  if (!Number.isFinite(temp)) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  if (temp <= 0) return 'linear-gradient(135deg, #2f7a6d, #68b0a1)';
                  if (temp > 5) return 'linear-gradient(135deg, #c49a3a, #e6c76a)';
                  return 'linear-gradient(135deg, #7da453, #a8c66c)';
                ]]]
            - color: white
            - border-radius: 20px
            - padding: 16px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.20)
          grid:
            - grid-template-areas: '"i n" "i temp" "i status"'
            - grid-template-columns: 64px 1fr
            - grid-template-rows: min-content min-content min-content
          icon:
            - width: 36px
            - color: >
                [[[
                  const temp = Number(entity.state);
                  if (!Number.isFinite(temp)) return '#eceff1';
                  if (temp <= 0) return '#e0f2ef';
                  if (temp > 5) return '#fff4d6';
                  return '#f3f8e8';
                ]]]
          name:
            - justify-self: start
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            temp:
              - justify-self: start
              - font-size: 24px
              - font-weight: 800
            status:
              - justify-self: start
              - font-size: 13px
              - opacity: 0.95
  - type: grid
    title: المخططات البيانية
    cards:
      - type: weather-forecast
        entity: weather.forecast_home
        show_forecast: true
        forecast_type: daily
      - type: markdown
        content: '## البراد'
      - type: statistics-graph
        chart_type: line
        period: 5minute
        entities:
          - sensor.shellyplusuni_a0dd6c295c74_fridge_temperature_sensor_temperature
        stat_types:
          - mean
        days_to_show: 1
      - type: markdown
        content: '## غرفة النوم'
      - type: statistics-graph
        chart_type: line
        period: hour
        entities:
          - sensor.bedroom_temperature_sensor_temperature
        stat_types:
          - mean
        days_to_show: 1
      - type: markdown
        content: '## غرفة المعيشة'
      - type: statistics-graph
        chart_type: line
        period: hour
        entities:
          - sensor.living_room_temperature_sensor_temperature
          - sensor.living_room_air_conditioner_temperature
        stat_types:
          - mean
        days_to_show: 1
      - type: markdown
        content: '## خارج المنزل'
      - type: statistics-graph
        chart_type: line
        period: hour
        entities:
          - sensor.maya_room_temperature_sensor_temperature
        stat_types:
          - mean
        days_to_show: 1
      - type: markdown
        content: '## المطبخ'
      - type: statistics-graph
        chart_type: line
        period: hour
        entities:
          - sensor.kitchen_temperature_sensor_temperature
        stat_types:
          - mean
        days_to_show: 1
