      - type: custom:button-card
        entity: sensor.living_room_temperature_sensor_temperature
        name: المعيشة
        icon: mdi:sofa-outline
        show_state: false
        tap_action:
          action: more-info
        hold_action:
          action: more-info
        custom_fields:
          value: >
            [[[
              const t = Number(entity.state);
              return Number.isFinite(t) ? `${t.toFixed(1)}°C` : '--';
            ]]]
          status: >
            [[[
              const t = Number(entity.state);
              const ac = Number(states['sensor.living_room_air_conditioner_temperature']?.state);
              if (!Number.isFinite(t) && !Number.isFinite(ac)) return 'لا توجد قراءة';
              if (Number.isFinite(ac)) return `المكيف ${ac.toFixed(1)}°C`;
              if (t < 18) return 'بارد';
              if (t < 27) return 'مريح';
              return 'دافئ';
            ]]]
        styles:
          card:
            - background: >
                [[[
                  const t = Number(entity.state);
                  if (!Number.isFinite(t)) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  if (t < 18) return 'linear-gradient(135deg, #2f7a6d, #68b0a1)';
