              if (t < 18) return 'بارد';
              if (t < 27) return 'مريح';
              return 'دافئ';
            ]]]
        styles:
          card:
            - background: >
                [[[
                  const t = Number(entity.state);
                  if (!Number.isFinite(t)) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  if (t < 18) return 'linear-gradient(135deg, #2f7a6d, #68b0a1)';
