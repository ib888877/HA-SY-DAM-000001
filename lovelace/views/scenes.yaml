type: sections
max_columns: 2
title: المشاهد
icon: mdi:home-lightning-bolt
path: scenes

sections:

  # ─── حالة المشهد النشط ────────────────────────────────────────────
  - type: grid
    cards:
      - type: heading
        heading: المشاهد الجاهزة
        heading_style: title
        icon: mdi:home-lightning-bolt

      - type: custom:button-card
        entity: scene.out_of_home
        name: خروج من المنزل
        icon: mdi:home-export-outline
        tap_action:
          action: call-service
          service: scene.turn_on
          target:
            entity_id: scene.out_of_home
          confirmation:
            text: هل تريد تفعيل وضع الخروج من المنزل؟
        custom_fields:
          desc: إيقاف جميع الأضواء والمكيف والسخان وإغلاق الأباجور
        styles:
          card:
            - background: linear-gradient(135deg, #37474f, #546e7a)
            - color: white
            - border-radius: 20px
            - padding: 18px
            - height: 130px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.22)
          grid:
            - grid-template-areas: '"i n" "i desc"'
            - grid-template-columns: 60px 1fr
            - grid-template-rows: min-content min-content
            - align-items: center
            - column-gap: 14px
          icon:
            - width: 40px
            - color: '#b0bec5'
          name:
            - justify-self: start
            - font-size: 17px
            - font-weight: 700
          custom_fields:
            desc:
              - justify-self: start
              - font-size: 12px
              - opacity: 0.8
              - white-space: normal
              - line-height: 1.4
        grid_options:
          columns: 12
          rows: 2

      - type: custom:button-card
        entity: scene.in_home
        name: عودة إلى المنزل
        icon: mdi:home-import-outline
        tap_action:
          action: call-service
          service: scene.turn_on
          target:
            entity_id: scene.in_home
        custom_fields:
          desc: تشغيل الأضواء وفلتر الماء وفتح الأباجور
        styles:
          card:
            - background: linear-gradient(135deg, #2f7a6d, #68b0a1)
            - color: white
            - border-radius: 20px
            - padding: 18px
            - height: 130px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.22)
          grid:
            - grid-template-areas: '"i n" "i desc"'
            - grid-template-columns: 60px 1fr
