type: sections
max_columns: 2
title: المشاهد
icon: mdi:home-lightning-bolt
path: scenes

sections:
  # ─── مشاهد التنقل ─────────────────────────────────────────────────
  - type: grid
    title: التنقل
    cards:
      - type: heading
        heading: خروج ودخول
        heading_style: subtitle
        icon: mdi:home-switch

      - type: custom:button-card
        entity: input_boolean.scene_out_of_home_active
        name: خروج من المنزل
        icon: mdi:home-export-outline
        state_color: false
        show_state: false
        tap_action:
          action: call-service
          service: script.toggle_scene_out_of_home
        confirmation:
          text: هل تريد تفعيل وضع الخروج من المنزل؟
        custom_fields:
          desc: إيقاف جميع الأضواء والسخان وإغلاق الأباجور
        styles:
          card:
            - background: linear-gradient(135deg, #37474f, #546e7a)
            - color: white
            - border-radius: 20px
            - padding: 18px
            - height: 130px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.22)
          grid:
            - grid-template-areas: '"i n" "i desc"'
            - grid-template-columns: 60px 1fr
            - grid-template-rows: min-content min-content
            - align-items: center
            - column-gap: 14px
          icon:
            - width: 40px
            - color: '#b0bec5'
          name:
            - justify-self: start
            - font-size: 17px
            - font-weight: 700
          custom_fields:
            desc:
              - justify-self: start
              - font-size: 12px
              - opacity: 0.8
              - white-space: normal
              - line-height: 1.4
        state:
          - value: 'on'
            styles:
              card:
                - background: linear-gradient(135deg, #546e7a, #90a4ae)
                - box-shadow: 0 10px 22px rgba(0,0,0,0.28)
              icon:
                - color: '#ffffff'
              name:
                - color: '#ffffff'
              custom_fields:
                desc:
                  - color: '#f5f5f5'
        grid_options:
          columns: 12
          rows: 2

      - type: custom:button-card
        entity: input_boolean.scene_in_home_active
        name: عودة إلى المنزل
        icon: mdi:home-import-outline
        state_color: false
        show_state: false
        tap_action:
          action: call-service
          service: script.toggle_scene_in_home
        custom_fields:
          desc: تشغيل الأضواء وفلتر الماء وفتح الأباجور
        styles:
          card:
            - background: linear-gradient(135deg, #2f7a6d, #68b0a1)
            - color: white
            - border-radius: 20px
            - padding: 18px
            - height: 130px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.22)
          grid:
            - grid-template-areas: '"i n" "i desc"'
            - grid-template-columns: 60px 1fr
            - grid-template-rows: min-content min-content
            - align-items: center
            - column-gap: 14px
          icon:
            - width: 40px
            - color: '#e0f7f4'
          name:
            - justify-self: start
            - font-size: 17px
            - font-weight: 700
          custom_fields:
            desc:
              - justify-self: start
              - font-size: 12px
              - opacity: 0.85
              - white-space: normal
              - line-height: 1.4
        state:
          - value: 'on'
            styles:
              card:
                - background: linear-gradient(135deg, #4db6ac, #80cbc4)
                - box-shadow: 0 10px 22px rgba(0,0,0,0.28)
              icon:
                - color: '#ffffff'
              name:
                - color: '#ffffff'
              custom_fields:
                desc:
                  - color: '#f5f5f5'
        grid_options:
          columns: 12
          rows: 2

  # ─── مشاهد أوضاع الغرفة ───────────────────────────────────────────
