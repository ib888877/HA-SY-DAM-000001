type: sections
max_columns: 4
title: System
icon: mdi:server-network
path: system
sections:
  - type: grid
    cards:
      - type: tile
        entity: button.restart
        name: Restart Home Assistant
        icon: mdi:restart
        tap_action:
          action: toggle
          confirmation:
            text: Are you sure you want to restart Home Assistant?
      - type: heading
        heading: System Monitor
      - type: tile
        entity: sensor.system_monitor_disk_use
        name: Disk
        vertical: false
        features_position: bottom
      - type: tile
        entity: sensor.system_monitor_load_15_min
        name: Load
        vertical: false
        features_position: bottom
      - type: tile
        entity: sensor.system_monitor_memory_usage
        name: Memory
        vertical: false
        features_position: bottom
      - type: tile
        entity: sensor.system_monitor_processor_temperature
        name: Processor Temperature
        vertical: false
        features_position: bottom
      - type: tile
        entity: sensor.system_monitor_processor_use
        name: Processor Use
        vertical: false
        features_position: bottom
      - type: button
        name: إعادة تشغيل
        icon: mdi:restart
        tap_action:
          action: perform-action
          perform_action: homeassistant.restart
          confirmation:
            text: هل تريد إعادة تشغيل Home Assistant؟