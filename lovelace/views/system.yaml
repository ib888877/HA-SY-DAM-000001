type: sections
max_columns: 4
title: System
icon: mdi:server-network
path: system
sections:

  - type: grid
    title: الحالة والإجراءات
    cards:
      - type: heading
        heading: الإجراءات السريعة
        heading_style: title
        icon: mdi:lightning-bolt

      - type: button
        name: إعادة تشغيل HA
        icon: mdi:restart
        tap_action:
          action: call-service
          service: homeassistant.restart
        confirmation:
          text: هل تريد إعادة تشغيل Home Assistant؟

      - type: tile
        entity: sensor.system_monitor_last_boot
        name: آخر تشغيل
        vertical: false
        features_position: bottom

      - type: heading
        heading: تحديثات النظام
        heading_style: title
        icon: mdi:update

      - type: tile
        entity: update.home_assistant_core_update

      - type: tile
        entity: update.home_assistant_supervisor_update

      - type: tile
        entity: update.home_assistant_operating_system_update

  - type: grid
    title: مراقبة الأجهزة
    cards:
      - type: heading
        heading: المعالج والذاكرة والتخزين
        heading_style: title
        icon: mdi:chip

      - type: custom:button-card
        entity: sensor.system_monitor_processor_use
        name: المعالج
        icon: mdi:cpu-64-bit
        show_state: false
        tap_action:
          action: more-info
        custom_fields:
          value: >
            [[[
              const v = Number(entity.state);
              return Number.isFinite(v) ? `${v.toFixed(0)}%` : '--';
            ]]]
          status: >
            [[[
              const v = Number(entity.state);
              if (!Number.isFinite(v)) return 'لا توجد قراءة';
              if (v < 40) return 'منخفض';
              if (v < 70) return 'متوسط';
              return 'مرتفع';
            ]]]
        styles:
          card:
            - background: >
                [[[
                  const v = Number(entity.state);
                  if (!Number.isFinite(v)) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  if (v < 40) return 'linear-gradient(135deg, #7da453, #a8c66c)';
                  if (v < 70) return 'linear-gradient(135deg, #c49a3a, #e6c76a)';
                  return 'linear-gradient(135deg, #b71c1c, #ef5350)';
                ]]]
            - color: white
            - border-radius: 20px
            - padding: 16px
            - height: 108px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.20)
          grid:
            - grid-template-areas: '"i n" "i value" "i status"'
            - grid-template-columns: 52px 1fr
            - grid-template-rows: min-content min-content 1fr
            - column-gap: 12px
          img_cell:
            - justify-self: center
            - width: 36px
            - height: 36px
          icon:
            - color: white
            - width: 34px
          name:
            - justify-self: start
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            value:
              - justify-self: start
              - font-size: 24px
              - font-weight: 800
            status:
              - justify-self: start
              - font-size: 15px
              - font-weight: 700
              - color: rgba(255,255,255,0.92)

      - type: custom:button-card
        entity: sensor.system_monitor_processor_temperature
        name: حرارة المعالج
        icon: mdi:thermometer-high
        show_state: false
        tap_action:
          action: more-info
        custom_fields:
          value: >
            [[[
              const v = Number(entity.state);
              return Number.isFinite(v) ? `${v.toFixed(1)}°C` : '--';
            ]]]
          status: >
            [[[
              const v = Number(entity.state);
              if (!Number.isFinite(v)) return 'لا توجد قراءة';
              if (v < 50) return 'طبيعي';
              if (v < 70) return 'دافئ';
              return 'مرتفع';
            ]]]
        styles:
          card:
            - background: >
                [[[
                  const v = Number(entity.state);
                  if (!Number.isFinite(v)) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  if (v < 50) return 'linear-gradient(135deg, #7da453, #a8c66c)';
                  if (v < 70) return 'linear-gradient(135deg, #c49a3a, #e6c76a)';
                  return 'linear-gradient(135deg, #b71c1c, #ef5350)';
                ]]]
            - color: white
            - border-radius: 20px
            - padding: 16px
            - height: 108px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.20)
          grid:
            - grid-template-areas: '"i n" "i value" "i status"'
            - grid-template-columns: 52px 1fr
            - grid-template-rows: min-content min-content 1fr
            - column-gap: 12px
          img_cell:
            - justify-self: center
            - width: 36px
            - height: 36px
          icon:
            - color: white
            - width: 34px
          name:
            - justify-self: start
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            value:
              - justify-self: start
              - font-size: 24px
              - font-weight: 800
            status:
              - justify-self: start
              - font-size: 15px
              - font-weight: 700
              - color: rgba(255,255,255,0.92)

      - type: custom:button-card
        entity: sensor.system_monitor_memory_usage
        name: الذاكرة
        icon: mdi:memory
        show_state: false
        tap_action:
          action: more-info
        custom_fields:
          value: >
            [[[
              if (!entity) return '--';
              const v = Number(entity.state);
              return Number.isFinite(v) ? `${v.toFixed(0)}%` : '--';
            ]]]
          status: >
            [[[
              if (!entity) return 'لا توجد قراءة';
              const v = Number(entity.state);
              if (!Number.isFinite(v)) return 'لا توجد قراءة';
              if (v < 60) return 'طبيعي';
              if (v < 80) return 'متوسط';
              return 'مرتفع';
            ]]]
        styles:
          card:
            - background: >
                [[[
                  const v = Number(entity.state);
                  if (!Number.isFinite(v)) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  if (v < 60) return 'linear-gradient(135deg, #7da453, #a8c66c)';
                  if (v < 80) return 'linear-gradient(135deg, #c49a3a, #e6c76a)';
                  return 'linear-gradient(135deg, #b71c1c, #ef5350)';
                ]]]
            - color: white
            - border-radius: 20px
            - padding: 16px
            - height: 108px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.20)
          grid:
            - grid-template-areas: '"i n" "i value" "i status"'
            - grid-template-columns: 52px 1fr
            - grid-template-rows: min-content min-content 1fr
            - column-gap: 12px
          img_cell:
            - justify-self: center
            - width: 36px
            - height: 36px
          icon:
            - color: white
            - width: 34px
          name:
            - justify-self: start
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            value:
              - justify-self: start
              - font-size: 24px
              - font-weight: 800
            status:
              - justify-self: start
              - font-size: 15px
              - font-weight: 700
              - color: rgba(255,255,255,0.92)

      - type: custom:button-card
        entity: sensor.system_monitor_disk_use
        name: التخزين
        icon: mdi:harddisk
        show_state: false
        tap_action:
          action: more-info
        custom_fields:
          value: >
            [[[
              if (!entity) return '--';
              const v = Number(entity.state);
              return Number.isFinite(v) ? `${v.toFixed(1)} GiB` : '--';
            ]]]
          status: >
            [[[
              if (!entity) return 'لا توجد قراءة';
              const v = Number(entity.state);
              if (!Number.isFinite(v)) return 'لا توجد قراءة';
              return 'مستخدم';
            ]]]
        styles:
          card:
            - background: >
                [[[
                  const v = Number(entity.state);
                  if (!Number.isFinite(v)) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  if (v < 60) return 'linear-gradient(135deg, #7da453, #a8c66c)';
                  if (v < 80) return 'linear-gradient(135deg, #c49a3a, #e6c76a)';
                  return 'linear-gradient(135deg, #b71c1c, #ef5350)';
                ]]]
            - color: white
            - border-radius: 20px
            - padding: 16px
            - height: 108px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.20)
          grid:
            - grid-template-areas: '"i n" "i value" "i status"'
            - grid-template-columns: 52px 1fr
            - grid-template-rows: min-content min-content 1fr
            - column-gap: 12px
          img_cell:
            - justify-self: center
            - width: 36px
            - height: 36px
          icon:
            - color: white
            - width: 34px
          name:
            - justify-self: start
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            value:
              - justify-self: start
              - font-size: 24px
              - font-weight: 800
            status:
              - justify-self: start
              - font-size: 15px
              - font-weight: 700
              - color: rgba(255,255,255,0.92)

  - type: grid
    title: تفاصيل الحمل والموارد
    cards:
      - type: heading
        heading: حمل المعالج
        heading_style: title
        icon: mdi:chart-line

      - type: tile
        entity: sensor.system_monitor_load_1_min
        name: حمل (1 دقيقة)
        vertical: false
        features_position: bottom

      - type: tile
        entity: sensor.system_monitor_load_15_min
        name: حمل (15 دقيقة)
        vertical: false
        features_position: bottom

      - type: heading
        heading: الذاكرة والتخزين
        heading_style: title
        icon: mdi:database

      - type: tile
        entity: sensor.system_monitor_memory_usage
        name: ذاكرة مستخدمة
        vertical: false
        features_position: bottom

      - type: tile
        entity: sensor.system_monitor_disk_use
        name: تخزين مستخدم
        vertical: false
        features_position: bottom

  - type: grid
    title: المخططات التاريخية
    cards:
      - type: statistics-graph
        title: استخدام المعالج (%)
        chart_type: line
        period: 5minute
        days_to_show: 1
        stat_types:
          - mean
        entities:
          - entity: sensor.system_monitor_processor_use
            name: المعالج

      - type: statistics-graph
        title: حرارة المعالج
        chart_type: line
        period: 5minute
        days_to_show: 1
        stat_types:
          - mean
        entities:
          - entity: sensor.system_monitor_processor_temperature
            name: الحرارة

      - type: statistics-graph
        title: استخدام الذاكرة (%)
        chart_type: line
        period: 5minute
        days_to_show: 1
        stat_types:
          - mean
        entities:
          - entity: sensor.system_monitor_memory_usage
            name: الذاكرة

      - type: statistics-graph
        title: التخزين المستخدم (GiB)
        chart_type: line
        period: hour
        days_to_show: 7
        stat_types:
          - mean
        entities:
          - entity: sensor.system_monitor_disk_use
            name: التخزين
