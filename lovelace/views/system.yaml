      - type: tile
        entity: sensor.system_monitor_load_15_min
        name: Load
        vertical: false
        features_position: bottom
      - type: tile
        entity: sensor.system_monitor_memory_usage
        name: Memory
        vertical: false
        features_position: bottom
      - type: tile
        entity: sensor.system_monitor_processor_temperature
        name: Processor Temperature
        vertical: false
        features_position: bottom
