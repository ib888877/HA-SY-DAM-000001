type: sections
max_columns: 4
icon: mdi:lightning-bolt
path: energy
title: الطاقة

sections:
  - type: grid
    title: ملخص الاستهلاك
    cards:
      - type: custom:button-card
        entity: sensor.power_grid_energy_daily
        name: استهلاك اليوم
        icon: mdi:calendar-today
        show_state: false
        tap_action:
          action: more-info
        hold_action:
          action: more-info
        custom_fields:
          value: >
            [[[
              const v = Number(entity.state);
              return Number.isFinite(v) ? `${v.toFixed(2)} kWh` : '--';
            ]]]
          sub: >
            [[[
              return 'من حساس الاستطاعة';
            ]]]
        styles:
          card:
            - border-radius: 20px
            - padding: 16px
            - height: 108px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.20)
            - background: linear-gradient(135deg, #2f7a6d 0%, #68b0a1 100%)
          grid:
            - grid-template-areas: '"i n" "i value" "i sub"'
            - grid-template-columns: 52px 1fr
            - grid-template-rows: min-content min-content 1fr
            - column-gap: 12px
          img_cell:
            - align-self: center
            - justify-self: center
            - width: 36px
            - height: 36px
          icon:
            - color: white
            - width: 34px
          name:
            - align-self: end
            - justify-self: start
            - color: white
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            value:
              - align-self: center
              - justify-self: start
              - color: white
              - font-size: 22px
              - font-weight: 800
              - line-height: 1.2
            sub:
              - align-self: start
              - justify-self: start
              - color: rgba(255,255,255,0.92)
              - font-size: 14px
              - font-weight: 700

