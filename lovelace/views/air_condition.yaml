type: sections
max_columns: 4
title: مكيف الهواء
path: air-condition
icon: mdi:air-conditioner

sections:
  - type: grid
    title: التحكم الرئيسي
    cards:
      - type: heading
        heading: مكيف الهواء
        heading_style: title
        icon: mdi:air-conditioner

      - type: tile
        entity: climate.living_room_air_conditioner
        name: مكيف غرفة المعيشة
        icon: mdi:air-conditioner
        features:
          - type: climate-hvac-modes
          - type: climate-fan-modes
          - type: target-temperature
        grid_options:
          columns: 12
          rows: 2

  - type: grid
    title: القراءات
    cards:
      - type: heading
        heading: الحرارة والرطوبة
        heading_style: subtitle
        icon: mdi:gauge

      - type: tile
        entity: sensor.living_room_air_conditioner_temperature
        name: درجة الحرارة
        icon: mdi:thermometer
        grid_options:
          columns: 6
          rows: 1

      - type: tile
        entity: sensor.living_room_air_conditioner_humidity
        name: الرطوبة
        icon: mdi:water-percent
        grid_options:
          columns: 6
          rows: 1

  - type: grid
    title: الطاقة
    cards:
      - type: heading
        heading: استهلاك الكهرباء
        heading_style: subtitle
        icon: mdi:lightning-bolt

      - type: tile
        entity: sensor.living_room_air_conditioner_power
        name: الاستهلاك الحالي
        icon: mdi:flash
        grid_options:
          columns: 6
          rows: 1

      - type: tile
        entity: sensor.living_room_air_conditioner_energy
        name: إجمالي الاستهلاك
        icon: mdi:counter
        grid_options:
          columns: 6
          rows: 1

      - type: tile
        entity: sensor.living_room_air_conditioner_energy_saved
        name: الطاقة الموفرة
        icon: mdi:leaf
        grid_options:
          columns: 6
          rows: 1

      - type: tile
        entity: sensor.living_room_air_conditioner_power_energy
        name: الطاقة المتغيرة
        icon: mdi:pulse
        grid_options:
          columns: 6
          rows: 1

      - type: tile
        entity: sensor.living_room_air_conditioner_energy_difference
        name: اختلاف الطاقة
        icon: mdi:delta
        grid_options:
          columns: 6
          rows: 1