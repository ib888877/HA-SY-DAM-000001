type: sections
max_columns: 4
icon: mdi:home
path: home
title: الرئيسية

sections:
  - type: grid
    cards:
      - type: custom:button-card
        entity: sensor.sonoff_1002328b17_power
        name: الكهرباء
        show_state: false
        custom_fields:
          value: >
            [[[
              const watts = Number(entity.state);
              const wat = Number.isFinite(watts) ? `${Math.round(watts)} W` : '--';
      
              const lastChanged = new Date(entity.last_changed);
              const elapsedMs = Date.now() - lastChanged.getTime();
      
              let elapsedText = '--';
              if (Number.isFinite(elapsedMs) && elapsedMs >= 0) {
                const minutes = Math.floor(elapsedMs / 60000);
                const hours = Math.floor(minutes / 60);
                const days = Math.floor(hours / 24);
      
                if (days > 0) {
                  elapsedText = `${days}d`;
                } else if (hours > 0) {
                  elapsedText = `${hours}h`;
                } else {
                  elapsedText = `${Math.max(minutes, 1)}m`;
                }
              }
              if (Number.isFinite(watts) && watts > 0) {
                return `${Math.round(watts)} W`;
              }
              return `${wat} since ${elapsedText}`;
            ]]]
        tap_action:
          action: navigate
          navigation_path: /lovelace/energy
        styles:
          card:
            - background-color: >
                [[[
                  return Number(entity.state) > 0 ? 'green' : 'red';
                ]]]
            - color: white
            - border-radius: 20px
            - padding: 16px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.20)
            - height: 108px
          grid:
            - grid-template-areas: '"n" "value"'
            - grid-template-columns: 1fr
            - grid-template-rows: min-content 1fr
            - justify-items: center
            - align-items: center
          name:
            - font-size: 18px
            - font-weight: 700
          custom_fields:
            value:
              - font-size: 22px
              - font-weight: 800
        grid_options:
          columns: 6
          rows: 2

      - type: custom:button-card
        entity: sensor.speedtest_download
        name: الإنترنت
        icon: mdi:web
        show_state: false
        custom_fields:
          down: >
            [[[
              const value = Number(states['sensor.speedtest_download']?.state);
              return Number.isFinite(value) ? `${value.toFixed(1)} Mbps` : '--';
            ]]]
        tap_action:
          action: navigate
          navigation_path: /lovelace/internet
        hold_action:
          action: more-info
        styles:
          card:
            - background: >
                [[[
                  const down = Number(states['sensor.speedtest_download']?.state);
                  const ping = Number(states['sensor.speedtest_ping']?.state);
                  if (!Number.isFinite(down) || !Number.isFinite(ping)) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  if (down < 10 || ping > 100) return 'linear-gradient(135deg, #8d6e63, #bcaaa4)';
                  if (down < 25 || ping > 50) return 'linear-gradient(135deg, #c49a3a, #e6c76a)';
                  return 'linear-gradient(135deg, #2f7a6d, #68b0a1)';
                ]]]
            - color: white
            - border-radius: 20px
            - padding: 16px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.20)
            - height: 108px
          grid:
            - grid-template-areas: '"i n" "i down"'
            - grid-template-columns: 64px 1fr
            - grid-template-rows: min-content min-content
          icon:
            - width: 34px
            - color: '#ffffff'
          name:
            - justify-self: start
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            down:
              - justify-self: start
              - font-size: 17px
              - font-weight: 800
        grid_options:
          columns: 6
          rows: 2

