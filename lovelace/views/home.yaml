            diff_label:
              - justify-self: center
              - font-size: 12px
              - font-weight: 700
              - opacity: 0.9
            in_temp:
              - justify-self: center
              - font-size: 14px
              - font-weight: 700
            diff:
              - justify-self: center
              - font-size: 13px
              - font-weight: 800
              - color: '#ffd166'
        custom_fields:
          out_label: >
            [[[
              return 'برا';
            ]]]
          out_temp: >
            [[[
              const temp = states['sensor.maya_room_temperature_sensor_temperature']?.state;
              return (temp !== undefined && temp !== null && temp !== 'unknown' && temp !== 'unavailable')
                ? `${temp}°`
                : '--';
            ]]]
          in_label: >
            [[[
              return 'جوا';
            ]]]
          in_temp: >
            [[[
              const temp = states['sensor.living_room_temperature_sensor_temperature']?.state;
              return (temp !== undefined && temp !== null && temp !== 'unknown' && temp !== 'unavailable')
                ? `${temp}°`
                : '--';
            ]]]
          diff_label: >
            [[[
              return 'فرق';
            ]]]
          diff: >
            [[[
              const inside = Number(states['sensor.living_room_temperature_sensor_temperature']?.state);
              const outside = Number(states['sensor.maya_room_temperature_sensor_temperature']?.state);
              if (Number.isFinite(inside) && Number.isFinite(outside)) {
                return `${Math.abs(inside - outside).toFixed(1)}°`;
              }
              return '--';
            ]]]
        grid_options:
          columns: 6
          rows: 1

  - type: grid
    cards:
      - type: clock
        title: الوقت
        clock_size: small
        show_seconds: false

      - type: tile
        entity: sun.sun
        vertical: false
        features_position: bottom

      - type: picture-glance
        title: الباب الرئيسي
        camera_view: auto
        fit_mode: cover
        image: https://demo.home-assistant.io/stub_config/kitchen.png
        camera_image: camera.main_door
        entities: []

      - type: picture-glance
        title: الشارع
        camera_view: auto
        fit_mode: cover
        image: https://demo.home-assistant.io/stub_config/kitchen.png
        camera_image: camera.street
        entities: []

header:
  layout: center
  badges_position: bottom
  badges_wrap: scroll
