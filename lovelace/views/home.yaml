type: sections
max_columns: 4
icon: mdi:home
path: home
title: الرئيسية
sections:
  - type: grid
    cards:
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.sonoff_1002328b17_power
            above: 0
        card:
          type: markdown
          content: '## <center><font color=green>الكهرباء: {{ states(''sensor.sonoff_1002328b17_power'') }} واط</font></center>'
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.sonoff_1002328b17_power
            below: 1
        card:
          type: markdown
          content: '## <center><font color=red>الكهرباء: مطفأة</font></center>'
      - type: tile
        entity: sensor.speedtest_download
        name: الإنترنت
        color: blue
        vertical: false
        features_position: bottom
        tap_action:
          action: navigate
          navigation_path: /lovelace/internet
  - type: grid
    title: الإضاءة والأجهزة
    cards:
      - type: tile
        entity: switch.sonoff_100242dedf_1
        name: إضاءة حمام
        vertical: false
        features_position: bottom
        tap_action:
          action: toggle
      - type: tile
        entity: switch.sonoff_100242cd4c_1
        name: إضاءة مطبخ
        vertical: false
        features_position: bottom
        tap_action:
          action: toggle
      - type: tile
        entity: switch.sonoff_100246fe54
        name: شفاط الحمام
        vertical: false
        features_position: bottom
        tap_action:
          action: toggle
      - type: tile
        entity: switch.sonoff_1002182e4e
        name: براد
        vertical: false
        features_position: bottom
        tap_action:
          action: toggle
      - type: tile
        entity: switch.sonoff_10024297c2_1
        name: إضاءة باب المنزل
        vertical: false
        features_position: bottom
        tap_action:
          action: toggle
      - type: tile
        entity: switch.sonoff_100246ef1a
        name: فلتر الماء
        vertical: false
        features_position: bottom
        tap_action:
          action: toggle
      - type: tile
        entity: switch.sonoff_10020f85cb
        name: مضخة الماء
        vertical: false
        features_position: bottom
      - type: gauge
        entity: sensor.water_tank_level
        name: خزان الماء
        needle: true
        severity:
          green: 70
          yellow: 30
          red: 0
      - type: tile
        entity: light.sonoff_1002655578
        name: ليد المطبخ
        vertical: false
        features_position: bottom
      - type: tile
        entity: cover.sonoff_10024019b4
        name: أباجور
        vertical: false
        features_position: bottom
      - type: entities
        entities:
          - entity: sensor.shellyplusuni_78421c52e014_temperature
            name: حرارة الماء
          - entity: switch.sonoff_100269b29e_switch
            name: تسخين الماء
      - type: gauge
        entity: sensor.home_battery_level
        name: بطارية المنزل
        unit: '%'
        needle: true
        severity:
          green: 70
          yellow: 30
          red: 0
      - type: tile
        entity: automation.living_room_activate_air_condition
        name: مكيف
        icon: mdi:air-conditioner
        vertical: false
        features_position: bottom
      - type: tile
        entity: switch.sonoff_100255fa0e
        name: غسالة
        icon: mdi:washing-machine
        vertical: false
        features_position: bottom
      - type: tile
        entity: sensor.smoothed_battery_level
        name: فولت بطارية المنزل
        vertical: false
        features_position: bottom
  - type: grid
    cards:
      - clock_size: small
        show_seconds: false
        type: clock
        title: الوقت
      - type: tile
        entity: sun.sun
        vertical: false
        features_position: bottom
      - camera_view: live
        fit_mode: contain
        type: picture-glance
        image: https://demo.home-assistant.io/stub_config/kitchen.png
        entities: []
        camera_image: camera.main_door
      - camera_view: auto
        fit_mode: cover
        type: picture-glance
        image: https://demo.home-assistant.io/stub_config/kitchen.png
        entities: []
        camera_image: camera.street
header:
  layout: center
  badges_position: bottom
  badges_wrap: scroll
