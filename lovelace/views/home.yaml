type: sections
max_columns: 4
icon: mdi:home
path: home
title: الرئيسية
sections:
  - type: grid
    cards:
      - type: custom:button-card
        entity: sensor.sonoff_1002328b17_power
        name: الكهرباء
        show_state: true
        show_icon: false
        tap_action:
          action: navigate
          navigation_path: /energy
        styles:
          card:
            - background-color: >
                [[[
                  return Number(entity.state) > 0 ? 'green' : 'red';
                ]]]
            - color: white
            - font-weight: bold
            - font-size: 18px
            - text-align: center
          name:
            - color: white
          state:
            - color: white
        grid_options:
          columns: 6
          rows: 2

      - type: custom:button-card
        entity: sensor.speedtest_download
        name: الإنترنت
        icon: mdi:web
        show_state: false
        custom_fields:
          down: >
            [[[
              const value = Number(states['sensor.speedtest_download']?.state);
              return Number.isFinite(value) ? `${value.toFixed(1)} Mbps` : '--';
            ]]]
        tap_action:
          action: navigate
          navigation_path: internet
        hold_action:
          action: more-info
        styles:
          card:
            - background: >
                [[[
                  const down = Number(states['sensor.speedtest_download']?.state);
                  const ping = Number(states['sensor.speedtest_ping']?.state);
                  if (!Number.isFinite(down) || !Number.isFinite(ping)) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  if (down < 10 || ping > 100) return 'linear-gradient(135deg, #8d6e63, #bcaaa4)';
                  if (down < 25 || ping > 50) return 'linear-gradient(135deg, #c49a3a, #e6c76a)';
                  return 'linear-gradient(135deg, #2f7a6d, #68b0a1)';
                ]]]
            - color: white
          grid:
            - grid-template-areas: '"i n" "i down"'
            - grid-template-columns: 64px 1fr
            - grid-template-rows: min-content min-content
          icon:
            - width: 34px
            - color: '#ffffff'
          name:
            - justify-self: start
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            down:
              - justify-self: start
              - font-size: 17px
              - font-weight: 800
        grid_options:
          columns: 6
          rows: 2
      - type: custom:button-card
        entity: switch.sonoff_100242dedf_1
        name: حمام
        icon: mdi:shower
        show_state: false
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        styles:
          card:
            - background: >
                [[[
                  return entity.state === 'on'
                    ? 'linear-gradient(135deg, #c49a3a, #e6c76a)'
                    : 'linear-gradient(135deg, #546e7a, #78909c)';
                ]]]
            - color: white
            - border-radius: 18px
            - padding: 14px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.16)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: 32px 1fr
          icon:
            - width: 22px
            - color: >
                [[[
                  return entity.state === 'on' ? '#fff8e1' : '#dfe7ea';
                ]]]
          name:
            - justify-self: start
            - font-size: 15px
            - font-weight: 700
        grid_options:
          columns: 3
          rows: 1
      - type: custom:button-card
        entity: switch.sonoff_100242cd4c_1
        name: المطبخ
        icon: mdi:ceiling-light
        show_state: false
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        styles:
          card:
            - background: >
                [[[
                  return entity.state === 'on'
                    ? 'linear-gradient(135deg, #c49a3a, #e6c76a)'
                    : 'linear-gradient(135deg, #546e7a, #78909c)';
                ]]]
            - color: white
            - border-radius: 18px
            - padding: 14px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.16)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: 32px 1fr
          icon:
            - width: 22px
            - color: >
                [[[
                  return entity.state === 'on' ? '#fff8e1' : '#dfe7ea';
                ]]]
          name:
            - justify-self: start
            - font-size: 15px
            - font-weight: 700
        grid_options:
          columns: 3
          rows: 1
      - type: custom:button-card
        entity: switch.sonoff_1002182e4e
        name: البراد
        icon: mdi:fridge
        show_state: false
        custom_fields:
          status: >
            [[[
              const temp = Number(states['sensor.shellyplusuni_a0dd6c295c74_fridge_temperature_sensor_temperature']?.state);
              const tempText = Number.isFinite(temp) ? `${temp.toFixed(1)}°C` : '--';
              const powerText = entity.state === 'on' ? 'يعمل' : 'متوقف';
              return `${tempText} • ${powerText}`;
            ]]]
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        styles:
          card:
            - background: >
                [[[
                  const temp = Number(states['sensor.shellyplusuni_a0dd6c295c74_fridge_temperature_sensor_temperature']?.state);
                  if (!Number.isFinite(temp)) return 'linear-gradient(135deg, #546e7a, #78909c)';
                  if (temp <= 0) return 'linear-gradient(135deg, #2f7a6d, #68b0a1)';
                  if (temp > 5) return 'linear-gradient(135deg, #c49a3a, #e6c76a)';
                  return 'linear-gradient(135deg, #7da453, #a8c66c)';
                ]]]
            - color: white
            - border-radius: 20px
            - padding: 16px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.20)
          grid:
            - grid-template-areas: '"i n" "i status"'
            - grid-template-columns: 64px 1fr
            - grid-template-rows: min-content min-content
          icon:
            - width: 36px
            - color: >
                [[[
                  if (entity.state !== 'on') return '#cfd8dc';
                  const temp = Number(states['sensor.shellyplusuni_a0dd6c295c74_fridge_temperature_sensor_temperature']?.state);
                  if (!Number.isFinite(temp)) return '#eceff1';
                  if (temp <= 0) return '#e0f2ef';
                  if (temp > 5) return '#fff4d6';
                  return '#f3f8e8';
                ]]]
          name:
            - justify-self: start
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            status:
              - justify-self: start
              - font-size: 15px
              - font-weight: 700
              - opacity: 0.95
        grid_options:
          columns: 6
          rows: 2
      - type: custom:button-card
        entity: switch.sonoff_10024297c2_1
        name: الباب
        icon: mdi:coach-lamp
        show_state: false
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        styles:
          card:
            - background: >
                [[[
                  return entity.state === 'on'
                    ? 'linear-gradient(135deg, #c49a3a, #e6c76a)'
                    : 'linear-gradient(135deg, #546e7a, #78909c)';
                ]]]
            - color: white
            - border-radius: 18px
            - padding: 14px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.16)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: 32px 1fr
          icon:
            - width: 22px
            - color: >
                [[[
                  return entity.state === 'on' ? '#fff8e1' : '#dfe7ea';
                ]]]
          name:
            - justify-self: start
            - font-size: 15px
            - font-weight: 700
        grid_options:
          columns: 3
          rows: 1
      - type: custom:button-card
        entity: light.sonoff_1002655578
        name: ليد
        icon: mdi:led-strip-variant
        show_state: false
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        styles:
          card:
            - background: >
                [[[
                  return entity.state === 'on'
                    ? 'linear-gradient(135deg, #7da453, #a8c66c)'
                    : 'linear-gradient(135deg, #546e7a, #78909c)';
                ]]]
            - color: white
            - border-radius: 18px
            - padding: 14px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.16)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: 32px 1fr
          icon:
            - width: 22px
            - color: >
                [[[
                  return entity.state === 'on' ? '#f3f8e8' : '#dfe7ea';
                ]]]
          name:
            - justify-self: start
            - font-size: 15px
            - font-weight: 700
        grid_options:
          columns: 3
          rows: 1
      - type: tile
        entity: switch.sonoff_100246ef1a
        name: فلتر الماء
        vertical: false
        features_position: bottom
        tap_action:
          action: toggle
      - type: tile
        entity: switch.sonoff_10020f85cb
        name: مضخة الماء
        vertical: false
        features_position: bottom
      - type: gauge
        entity: sensor.water_tank_level
        name: خزان الماء
        needle: true
        severity:
          green: 70
          yellow: 30
          red: 0
        grid_options:
          columns: 6
          rows: 3
      - type: gauge
        entity: sensor.home_battery_level
        name: بطارية المنزل
        unit: "%"
        needle: true
        severity:
          green: 70
          yellow: 30
          red: 0
        grid_options:
          columns: 6
          rows: 3

      - type: tile
        entity: cover.sonoff_10024019b4
        name: أباجور
        vertical: false
        features_position: bottom
      - type: custom:button-card
        entity: switch.sonoff_100269b29e_switch
        name: سخان الماء
        icon: mdi:water-boiler
        show_state: false
        custom_fields:
          temp: >
            [[[
              const t = states['sensor.shellyplusuni_78421c52e014_temperature']?.state ?? '-';
              return `${t}°C`;
            ]]]
          status: >
            [[[
              return entity.state === 'on' ? 'يعمل الآن' : 'متوقف';
            ]]]
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        styles:
          card:
            - background: >
                [[[
                  return entity.state === 'on'
                    ? 'linear-gradient(135deg, #ff7043, #ffb74d)'
                    : 'linear-gradient(135deg, #37474f, #546e7a)';
                ]]]
            - color: white
            - border-radius: 20px
            - padding: 16px
            - box-shadow: 0 6px 14px rgba(0,0,0,0.25)
          grid:
            - grid-template-areas: '"i n" "i temp" "i status"'
            - grid-template-columns: 64px 1fr
            - grid-template-rows: min-content min-content min-content
          icon:
            - width: 36px
            - color: >
                [[[
                  return entity.state === 'on' ? '#fff59d' : '#cfd8dc';
                ]]]
          name:
            - justify-self: start
            - font-size: 16px
            - font-weight: 700
          custom_fields:
            temp:
              - justify-self: start
              - font-size: 24px
              - font-weight: 800
            status:
              - justify-self: start
              - font-size: 13px
              - opacity: 0.95
        grid_options:
          columns: 6
          rows: 2
      - type: tile
        entity: automation.living_room_activate_air_condition
        name: مكيف
        icon: mdi:air-conditioner
        vertical: false
        features_position: bottom
      - type: tile
        entity: switch.sonoff_100255fa0e
        name: غسالة
        icon: mdi:washing-machine
        vertical: false
        features_position: bottom
      - type: tile
        entity: sensor.smoothed_battery_level
        name: فولت بطارية المنزل
        vertical: false
        features_position: bottom
      - type: tile
        entity: switch.sonoff_100246fe54
        name: شفاط الحمام
        vertical: false
        features_position: bottom
        tap_action:
          action: toggle
  - type: grid
    cards:
      - clock_size: small
        show_seconds: false
        type: clock
        title: الوقت
      - type: tile
        entity: sun.sun
        vertical: false
        features_position: bottom
      - camera_view: live
        fit_mode: contain
        type: picture-glance
        image: https://demo.home-assistant.io/stub_config/kitchen.png
        entities: []
        camera_image: camera.main_door
      - camera_view: auto
        fit_mode: cover
        type: picture-glance
        image: https://demo.home-assistant.io/stub_config/kitchen.png
        entities: []
        camera_image: camera.street
header:
  layout: center
  badges_position: bottom
  badges_wrap: scroll
