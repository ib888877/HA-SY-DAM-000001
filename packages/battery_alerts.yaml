automation:
  - id: 'battery_alert_bedroom'
    alias: Low Battery - Bedroom Sensor
    description: 'Send Telegram notification when bedroom sensor battery is below 20%'
    triggers:
    - trigger: numeric_state
      entity_id: sensor.bedroom_temperature_sensor_battery
      below: 20
    conditions:
    - condition: template
      value_template: >
        {{ (now() - state_attr('automation.low_battery_bedroom_sensor', 'last_triggered') | default(now() - timedelta(days=2), true)).total_seconds() > 86400 }}
    actions:
    - action: telegram_bot.send_message
      data:
        message: >
          🔋 تنبيه بطارية منخفضة!
          جهاز: حساس غرفة النوم
          البطارية: {{ states('sensor.bedroom_temperature_sensor_battery') }}%
    mode: single

