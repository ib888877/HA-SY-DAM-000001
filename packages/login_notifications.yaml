automation:
  - id: 'login_notification_success'
    alias: Login Success - Telegram Notification
    description: 'Send Telegram notification on every successful Home Assistant login attempt'
    triggers:
    - trigger: event
      event_type: user_authentication_attempt
      event_data:
        result: true
    conditions: []
    actions:
    - action: telegram_bot.send_message
      data:
        message: >-
          ✅ تسجيل دخول ناجح | Login Successful

          👤 المستخدم | User: {{ trigger.event.data.get('username', 'Unknown') }}
          🔑 طريقة الدخول | Method: {{ trigger.event.data.get('auth_provider_type', 'homeassistant') }}
          🕐 الوقت | Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
          🌐 IP: {{ trigger.event.data.get('source_ip', 'N/A') }}
    mode: parallel
    max: 10

  - id: 'login_notification_failure'
    alias: Login Failure - Telegram Notification
    description: 'Send Telegram notification on every failed Home Assistant login attempt'
    triggers:
    - trigger: event
      event_type: user_authentication_attempt
      event_data:
        result: false
    conditions: []
    actions:
    - action: telegram_bot.send_message
      data:
        message: >-
          🚨 محاولة دخول فاشلة! | Login Failed!

          👤 المستخدم | User: {{ trigger.event.data.get('username', 'Unknown') }}
          ❌ السبب | Reason: {{ trigger.event.data.get('reason', trigger.event.data.get('error', 'Invalid credentials')) }}
          🕐 الوقت | Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
          🌐 IP: {{ trigger.event.data.get('source_ip', 'N/A') }}
    mode: parallel
    max: 10
