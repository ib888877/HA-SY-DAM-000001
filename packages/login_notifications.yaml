automation:
  - id: login_notification_failure
    alias: Login Failure - Telegram Notification
    description: Send Telegram notification on failed Home Assistant login attempts
    triggers:
      - trigger: persistent_notification
        update_type: added
    conditions:
      - condition: template
        value_template: >
          {% set msg = trigger.notification.message | default('', true) %}
          {{
            'Too many login attempts' in msg
            or 'invalid authentication' in msg
            or 'login attempt' in msg
          }}
    actions:
      - action: telegram_bot.send_message
        data:
          message: >-
            🚨 محاولة دخول فاشلة | Login Failed

            {{ trigger.notification.message }}

            🕐 الوقت | Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
    mode: queued
    max: 10