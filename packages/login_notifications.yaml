automation:
  - id: login_notification_failure
    alias: Login Failure - Telegram Notification
    description: Send Telegram notification on failed Home Assistant login attempts
    triggers:
      - trigger: persistent_notification
        update_type:
          - added
          - updated
    conditions:
      - condition: template
        value_template: >
          {% set title = trigger.notification.title | default('', true) %}
          {% set msg = trigger.notification.message | default('', true) %}
          {{
            'Too many login attempts' in msg
            or 'invalid authentication' in msg
            or 'login attempt' in msg
            or 'Login attempt failed' in title
            or 'Login attempt failed' in msg
          }}
    actions:
      - action: telegram_bot.send_message
        data:
          message: >-
            🚨 تنبيه أمني - محاولة دخول فاشلة
            
            النوع: فشل تسجيل دخول
            الوقت: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
            العنوان: {{ trigger.notification.title | default('غير متوفر', true) }}
            
            التفاصيل:
            {{ trigger.notification.message | default('لا توجد تفاصيل', true) }}
    mode: queued
    max: 10
