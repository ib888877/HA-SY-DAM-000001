automation:
  - id: '1756475317489'
    alias: Main Door Light off after 5 min
    description: ''
    triggers:
    - type: turned_on
      device_id: f4f10d9b3b9a7ee3a448093e17750116
      entity_id: 0a98a7ccc4818fc8cf9327a7187f8f88
      domain: switch
      trigger: device
      for:
        hours: 0
        minutes: 5
        seconds: 0
    conditions: []
    actions:
    - type: turn_off
      device_id: f4f10d9b3b9a7ee3a448093e17750116
      entity_id: 0a98a7ccc4818fc8cf9327a7187f8f88
      domain: switch
    mode: single

  - id: '1756845201939'
    alias: Main Door Opened Switch on Linght
    description: ''
    triggers:
    - type: opened
      device_id: dba0043a6db6d1de535757cf5c37935f
      entity_id: 8a5544432750cc51851104a8cc476267
      domain: binary_sensor
      trigger: device
    conditions: []
    actions:
    - type: turn_on
      device_id: f4f10d9b3b9a7ee3a448093e17750116
      entity_id: 0a98a7ccc4818fc8cf9327a7187f8f88
      domain: switch
    - action: telegram_bot.send_message
      metadata: {}
      data:
        message: '🚪 تم فتح الباب الرئيسي'
    mode: single

  - id: '1759597683911'
    alias: Main Door Person → Telegram
    triggers:
    - entity_id: binary_sensor.main_door_person_occupancy
      to: 'on'
      trigger: state
    actions:
    - type: turn_on
      device_id: f4f10d9b3b9a7ee3a448093e17750116
      entity_id: 0a98a7ccc4818fc8cf9327a7187f8f88
      domain: switch
    - target:
        entity_id: camera.main_door
      data:
        filename: '{{ snap }}'
      action: camera.snapshot
    - delay: 00:00:02
    - data:
        file: '{{ snap }}'
        caption: "\U0001F6B6 شخص عند الباب الرئيسي ({{ now().strftime('%H:%M:%S') }})"
      action: telegram_bot.send_photo
    mode: single
    variables:
      snap: /config/www/main_door/{{ now().strftime('%Y%m%d_%H%M%S') }}.jpg
