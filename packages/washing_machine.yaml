automation:
  - id: 'washing_machine_done'
    alias: Washing Machine Done Notification
    description: >
      Sends a Telegram notification when the washing machine finishes.
      Triggered when power was high (>5W) for at least 5 min, then drops to near zero.
    triggers:
    - trigger: numeric_state
      entity_id: sensor.sonoff_100255fa0e_power
      below: 2
      for:
        minutes: 3
    conditions:
    - condition: numeric_state
      entity_id: sensor.sonoff_100255fa0e_energy_day
      above: 0.1
    - condition: state
      entity_id: switch.sonoff_100255fa0e
      state: 'on'
    actions:
    - action: telegram_bot.send_message
      data:
        message: "🧺 الغسالة انتهت! يمكنك إخراج الغسيل."
    mode: single
