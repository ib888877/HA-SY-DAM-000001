automation:
  - id: washing_machine_done
    alias: Washing Machine Done Notification
    description: Sends Telegram notification when washing machine finishes.

    trigger:
      - platform: numeric_state
        entity_id: sensor.sonoff_100255fa0e_power
        above: 5
        for:
          minutes: 5

    condition:
      - condition: state
        entity_id: switch.sonoff_100255fa0e
        state: "on"

    action:
      - wait_for_trigger:
          - platform: numeric_state
            entity_id: sensor.sonoff_100255fa0e_power
            below: 2
            for:
              minutes: 3
        timeout: "03:00:00"
        continue_on_timeout: false

      - action: telegram_bot.send_message
        data:
          message: "🧺 الغسالة انتهت! يمكنك إخراج الغسيل."

    mode: single

  - id: washing_machine_daytime_and_grid_control
    alias: Washing Machine - Daytime and Grid Control

    triggers:
      - trigger: sun
        event: sunrise
        offset: "03:00:00"

      - trigger: sun
        event: sunset
        offset: "-03:00:00"

      - trigger: state
        entity_id: binary_sensor.power_grid_available
        to: "on"
        for:
          minutes: 1

      - trigger: state
        entity_id: binary_sensor.power_grid_available
        to: "off"
        for:
          minutes: 1

      - trigger: homeassistant
        event: start

    actions:
      - choose:
          - conditions:
              - condition: sun
                after: sunrise
                after_offset: "03:00:00"
                before: sunset
                before_offset: "-03:00:00"

              - condition: state
                entity_id: binary_sensor.power_grid_available
                state: "on"

            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.sonoff_100255fa0e

        default:
          - action: switch.turn_off
            target:
              entity_id: switch.sonoff_100255fa0e

    mode: restart