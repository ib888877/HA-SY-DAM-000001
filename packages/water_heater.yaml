automation:
  - id: '1763831152810'
    alias: 'Water Heater On when Temperature below 25C'
    description: 'Turn on the water heater when water temperature drops below 25°C.'
    triggers:
    - trigger: numeric_state
      entity_id:
      - sensor.shellyplusuni_78421c52e014_temperature
      below: 25
    conditions:
    - condition: state
      entity_id: 20de7c42b6ee9db248c7d1feaae2ec7e
      state: 'off'
    actions:
    - type: turn_on
      device_id: c701e7934ca9f549e8d10469ba7f7470
      entity_id: 20de7c42b6ee9db248c7d1feaae2ec7e
      domain: switch
    mode: single

  - id: '1763831152811'
    alias: 'Water Heater Off when Temperature reaches 25C'
    description: 'Turn off the water heater once water temperature reaches 25°C.'
    triggers:
    - trigger: numeric_state
      entity_id:
      - sensor.shellyplusuni_78421c52e014_temperature
      above: 25
    conditions:
    - condition: state
      entity_id: 20de7c42b6ee9db248c7d1feaae2ec7e
      state: 'on'
    actions:
    - type: turn_off
      device_id: c701e7934ca9f549e8d10469ba7f7470
      entity_id: 20de7c42b6ee9db248c7d1feaae2ec7e
      domain: switch
    mode: single
