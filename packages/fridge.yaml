  - id: '1758313797727'
    alias: 'Fridge Temperature is over 6 degrees Notification '
    description: ''
    triggers:
    - trigger: numeric_state
      entity_id:
      - sensor.shellyplusuni_a0dd6c295c74_fridge_temperature_sensor_temperature
      above: 6
    conditions: []
    actions:
    - action: telegram_bot.send_message
      metadata: {}
      data:
        message: "\U0001F6A8 Fridge Temperature is over 6 degrees "
    - type: turn_on
      device_id: 64347edf227a998c3ffae52e8c6efe43
      entity_id: fd799cb5f113e8e314894c905da58cf4
      domain: switch
    - delay:
        hours: 0
        minutes: 15
        seconds: 0
        milliseconds: 0
    - if:
      - condition: time
        after: '19:35:00'
        before: 07:35:00
      - type: is_power
        condition: device
        device_id: d2083923ab583c1c87377258f7e41951
        entity_id: 4bb688679aaaa5d6af15421bdba33af0
        domain: sensor
        below: 1
      then:
      - type: turn_off
        device_id: 64347edf227a998c3ffae52e8c6efe43
        entity_id: fd799cb5f113e8e314894c905da58cf4
        domain: switch
    mode: single
