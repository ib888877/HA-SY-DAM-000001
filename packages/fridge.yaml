automation:
  - id: '1756847418302'
    alias: 'Grid On then Turn on Fridge '
    description: ''
    triggers:
    - type: power
      device_id: d2083923ab583c1c87377258f7e41951
      entity_id: 4bb688679aaaa5d6af15421bdba33af0
      domain: sensor
      trigger: device
      above: 1
      for:
        hours: 0
        minutes: 1
        seconds: 0
    conditions:
    - condition: time
      after: '19:36:00'
      before: 07:36:00
    actions:
    - type: turn_on
      device_id: 64347edf227a998c3ffae52e8c6efe43
