input_number:
  power_grid_energy_month_before_last:
    name: "استهلاك ما قبل الشهر الماضي"
    min: 0
    max: 99999
    step: 0.001
    unit_of_measurement: "kWh"
    mode: box
    icon: mdi:calendar-month-outline


sensor:
  - platform: integration
    source: sensor.sonoff_1002328b17_power
    name: Power Grid Energy Total
    unique_id: power_grid_energy_total
    unit_prefix: k
    round: 3
    method: trapezoidal

  - platform: statistics
    name: "Power Grid Energy Weekly Average"
    entity_id: sensor.power_grid_energy_yesterday
    state_characteristic: mean
    max_age:
      days: 7


utility_meter:
  power_grid_energy_daily:
    source: sensor.power_grid_energy_total
    cycle: daily

  power_grid_energy_monthly:
    source: sensor.power_grid_energy_total
    cycle: monthly

  power_grid_energy_bimonthly:
    source: sensor.power_grid_energy_total
    cycle: bimonthly


template:
  - sensor:
      - name: Power Grid Energy Yesterday
        unique_id: power_grid_energy_yesterday
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        icon: mdi:calendar-yesterday
        state: >
          {{ state_attr('sensor.power_grid_energy_daily', 'last_period') | float(0) | round(2) }}

      - name: Power Grid Energy Last Month
        unique_id: power_grid_energy_last_month
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        icon: mdi:calendar-month
        state: >
          {{ state_attr('sensor.power_grid_energy_monthly', 'last_period') | float(0) | round(2) }}

      - name: Power Grid Current Billing Cycle
        unique_id: power_grid_current_billing_cycle
        icon: mdi:calendar-range
        state: >
          {% set m = now().month %}
          {% if m in [1, 2] %}
            Jan-Feb | الدورة الأولى
          {% elif m in [3, 4] %}
            Mar-Apr | الدورة الثانية
          {% elif m in [5, 6] %}
            May-Jun | الدورة الثالثة
          {% elif m in [7, 8] %}
            Jul-Aug | الدورة الرابعة
          {% elif m in [9, 10] %}
            Sep-Oct | الدورة الخامسة
          {% else %}
            Nov-Dec | الدورة السادسة
          {% endif %}

      - name: Power Grid Energy Current Cycle
        unique_id: power_grid_energy_current_cycle
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        icon: mdi:lightning-bolt
        state: >
          {{ states('sensor.power_grid_energy_bimonthly') | float(0) | round(2) }}

      - name: Power Grid Energy Last Cycle
        unique_id: power_grid_energy_last_cycle
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        icon: mdi:history
        state: >
          {{ state_attr('sensor.power_grid_energy_bimonthly', 'last_period') | float(0) | round(2) }}

      - name: Power Grid Current Cycle Bill
        unique_id: power_grid_current_cycle_bill
        unit_of_measurement: "ل.س"
        state_class: measurement
        icon: mdi:cash-multiple
        state: >
          {% set kwh = states('sensor.power_grid_energy_bimonthly') | float(0) %}
          {% if kwh <= 300 %}
            {{ (kwh * 600) | round(0) }}
          {% else %}
            {{ ((300 * 600) + ((kwh - 300) * 1400)) | round(0) }}
          {% endif %}

      - name: Power Grid Last Cycle Bill
        unique_id: power_grid_last_cycle_bill
        unit_of_measurement: "ل.س"
        state_class: measurement
        icon: mdi:cash-check
        state: >
          {% set kwh = state_attr('sensor.power_grid_energy_bimonthly', 'last_period') | float(0) %}
          {% if kwh <= 300 %}
            {{ (kwh * 600) | round(0) }}
          {% else %}
            {{ ((300 * 600) + ((kwh - 300) * 1400)) | round(0) }}
          {% endif %}

      - name: Power Grid Bill Tier Current Cycle
        unique_id: power_grid_bill_tier_current_cycle
        icon: mdi:scale-balance
        state: >
          {% set kwh = states('sensor.power_grid_energy_bimonthly') | float(0) %}
          {% if kwh <= 300 %}
            الشريحة الأولى: 600 ل.س/ك.و.س
          {% else %}
            الشريحة الثانية: 1400 ل.س/ك.و.س فوق 300
          {% endif %}

      - name: Power Grid Daily Bill Estimate
        unique_id: power_grid_daily_bill_estimate
        unit_of_measurement: "ل.س"
        state_class: measurement
        icon: mdi:cash
        state: >
          {% set kwh = states('sensor.power_grid_energy_daily') | float(0) %}
          {% if kwh <= 300 %}
            {{ (kwh * 600) | round(0) }}
          {% else %}
            {{ ((300 * 600) + ((kwh - 300) * 1400)) | round(0) }}
          {% endif %}

      - name: Power Grid Monthly Bill Estimate
        unique_id: power_grid_monthly_bill_estimate
        unit_of_measurement: "ل.س"
        state_class: measurement
        icon: mdi:cash-clock
        state: >
          {% set kwh = states('sensor.power_grid_energy_monthly') | float(0) %}
          {% if kwh <= 300 %}
            {{ (kwh * 600) | round(0) }}
          {% else %}
            {{ ((300 * 600) + ((kwh - 300) * 1400)) | round(0) }}
          {% endif %}